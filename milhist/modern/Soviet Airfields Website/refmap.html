<!DOCTYPE html>
<html>
<head>
    <title>Former Soviet Airfields Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Load Leaflet CSS -->
    <link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
</head>
<body>
    <div id="map" style="width: 3000px; height: 800px;"></div>
    
    <!-- Load Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    
    <script>
        // Initialize the map
        var map = L.map('map').setView([61.273317, 89.560231], 3.5); // Center on Moscow, Russia

        // Add a base layer (OpenStreetMap)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        }).addTo(map);
        
        function getAirfieldIcon(zoom) {
            var size = Math.max(14, Math.round(zoom * 4 + 12));
            return L.icon({
                iconUrl: './TU95.png',
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2],
                popupAnchor: [0, -size / 2]
            });
        }

        function updateMarkerIcons(layerGroup) {
            var icon = getAirfieldIcon(map.getZoom());
            layerGroup.eachLayer(function (layer) {
                if (layer instanceof L.Marker) {
                    layer.setIcon(icon);
                }
            });
        }

        // Load GeoJSON data
        fetch('./sovietbase.geojson')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} loading GeoJSON`);
                }
                return response.json();
            })
            .then(data => {
                var airfieldsLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        return L.marker(latlng, { icon: getAirfieldIcon(map.getZoom()) });
                    },
                    onEachFeature: function (feature, layer) {
                        var props = feature.properties || {};
                        var name = props['NAME (ENG)'] || props.NAME || 'Unnamed airfield';
                        var altName = props['ALT NAMES'] ? `<br>${props['ALT NAMES']}` : '';
                        layer.bindPopup(`<strong>${name}</strong>${altName}`);
                    }
                }).addTo(map);

                map.on('zoomend', function () {
                    updateMarkerIcons(airfieldsLayer);
                });
            })
            .catch(err => console.error('GeoJSON load failed:', err));
    </script>
</body>
</html>
